<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BADOMEN Report Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    /* Replace with your licensed background image */
    background:url('background.jpg') center center/cover no-repeat;
    position:relative;
}

body::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.65);
}

.container{
    position:relative;
    z-index:1;
    width:90%;
    max-width:650px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:20px;
    padding:35px;
    color:#fff;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.logo{
    text-align:center;
    margin-bottom:20px;
}

.logo h1{
    font-size:38px;
    color:#ff4444;
    letter-spacing:3px;
}

.logo p{
    color:#ddd;
    margin-top:8px;
}

form{
    display:flex;
    flex-direction:column;
    gap:15px;
}

input, textarea{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:rgba(255,255,255,0.15);
    color:#fff;
    outline:none;
}

input::placeholder,
textarea::placeholder{
    color:#ddd;
}

textarea{
    min-height:180px;
    resize:vertical;
}

button{
    padding:15px;
    border:none;
    border-radius:12px;
    background:#ff4444;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#ff2222;
    transform:translateY(-2px);
}

.notice{
    text-align:center;
    margin-top:15px;
    color:#ddd;
    font-size:14px;
}
</style>
</head>
<body>

<div class="container">
    <div class="logo">
        <h1>BADOMEN</h1>
        <p>Scam & Fraud Activity Report Center</p>
    </div>

    <form action="#" method="post">
        <input type="email" name="email" placeholder="Your Email Address" required>

        <textarea
            name="report"
            placeholder="Describe the scam or fraudulent activity..."
            required></textarea>

        <button type="submit">Submit Report</button>
    </form>

    <div class="notice">
        Help keep the community safe by reporting suspicious activity.
    </div>
</div>

</body>
</html>
